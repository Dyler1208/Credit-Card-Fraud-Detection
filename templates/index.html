<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fraud Detection</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;

    background: url("{{ url_for('static', filename='bg.jpeg') }}") no-repeat center center/cover;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}


.phone {
    position: relative;
    z-index: 1;

    width: 360px;
    padding: 25px;
    border-radius: 25px;

    
    background: rgba(20, 20, 20, 0.55);

    
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    color: white;

    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}


h2 {
    text-align: center;
    margin-bottom: 20px;
}


form {
    display: flex;
    flex-direction: column;
    gap: 12px;
}


input, select {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: #2b2b2b;
    color: white;
    font-size: 14px;
    box-sizing: border-box;
}


select {
    appearance: none;
    cursor: pointer;
}


input[type="date"] {
    color: #aaa;
}


input:focus, select:focus {
    outline: none;
    border: 2px solid #00e676;
}


button {
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #00e676, #00c853);
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 5px;
}


.card {
    margin-top: 18px;
    padding: 20px;
    border-radius: 18px;
    text-align: center;
    width: 100%;
    box-sizing: border-box;
}


.safe {
    background: linear-gradient(135deg, #00e676, #00c853);
    color: #003300;
}


.fraud {
    background: linear-gradient(135deg, #ff4d4d, #b30000);
    color: white;
}


.card h2 {
    margin: 10px 0;
    font-size: 20px;
}

.card p {
    margin: 5px 0;
    font-size: 16px;
}

</style>
</head>

<body>

<div class="phone">
<h2>💳 Fraud Check</h2>

<form action="/predict" method="post">

    <input type="number" step="0.01" name="amt" placeholder="Amount" required>

    <select name="category" required>
        <option value="" disabled selected>Select Category</option>
        {% for c in categories %}
            <option value="{{c}}">{{c.replace('_',' ').title()}}</option>
        {% endfor %}
    </select>
    
    <input type="number" name="city_pop" placeholder="City Population" required>
    
    <input type="date" name="dob" required>
    
    <input type="number" name="hour" min="0" max="23" placeholder="Hour (0-23)" required>

<button type="submit">Check</button>

</form>

{% if status %}
<div class="card {{status}}">
    <h2>
        {% if status == "fraud" %}
            ⚠️ FRAUD DETECTED
        {% else %}
            ✅ SAFE TRANSACTION
        {% endif %}
    </h2>

    <p>Risk: {{ fraud_prob }}%</p>
</div>
{% endif %}

</div>

</body>
</html>
